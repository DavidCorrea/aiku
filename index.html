<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aiku</title>
  <meta name="description" content="A gallery of AI-generated haikus, each paired with a unique color palette and font — all chosen by artificial intelligence.">
  <meta property="og:title" content="aiku">
  <meta property="og:description" content="A gallery of AI-generated haikus, each paired with a unique color palette and font — all chosen by artificial intelligence.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://davidcorrea.github.io/aiku/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Full-page gradient background layers ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      transition: opacity 2s ease;
      will-change: opacity, background-position, background-size;
    }

    /* ── Scrim ── */
    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      mix-blend-mode: multiply;
    }

    /* ── Gradient morph animation ── */
    @keyframes morph {
      0%   { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 50% 50%; }
      25%  { background-position: 100% 0%, 100% 100%, 0% 100%, 0% 0%, 30% 70%; }
      50%  { background-position: 100% 100%, 0% 100%, 0% 0%, 100% 0%, 70% 30%; }
      75%  { background-position: 0% 100%, 0% 0%, 100% 0%, 100% 100%, 60% 60%; }
      100% { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 50% 50%; }
    }

    /* ── Page content ── */
    .page {
      position: relative;
      height: 100%;
      display: flex;
      flex: 1;
      flex-direction: column;
      padding: 16px 16px;
      gap: 12px;
    }

    @media (min-width: 640px) {
      .page {
        padding: 20px 24px;
        gap: 16px;
      }
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    @media (min-width: 640px) {
      .top-bar {
        gap: 12px;
        flex-wrap: nowrap;
      }
    }

    .top-bar .title {
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 2s ease;
    }
    .top-bar .title:hover {
      color: var(--font-color, #f0f0f0) !important;
    }

    .top-bar .nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .top-bar .nav a, .top-bar .nav span {
      font-size: 0.6rem;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 6px;
      transition: opacity 0.2s ease, border-color 2s ease, background 2s ease;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      color: var(--font-color, #f0f0f0);
    }

    @media (min-width: 640px) {
      .top-bar .nav a, .top-bar .nav span {
        font-size: 0.65rem;
        padding: 6px 14px;
      }
    }

    .top-bar .nav span.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    .top-bar .nav .latest {
      padding: 4px 8px;
    }

    @media (min-width: 640px) {
      .top-bar .nav .latest {
        padding: 6px 10px;
      }
    }

    .top-bar .counter {
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      transition: color 2s ease;
    }

    @media (min-width: 640px) {
      .top-bar .counter {
        font-size: 0.6rem;
      }
    }

    /* ── Stage ── */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      padding: 0 12px;
      overflow: hidden;
    }

    @media (min-width: 640px) {
      .stage {
        padding: 0 48px;
      }
    }

    .haiku-stage {
      width: 100%;
      text-align: center;
    }

    .haiku-stage .word {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.2s;
      transition: color 1.2s ease;
      border-bottom: 1px solid transparent;
    }
    .haiku-stage .word:hover {
      border-bottom-color: currentColor;
    }

    @media (min-width: 640px) {
      .haiku-stage .word {
        font-size: clamp(0.6rem, 1.2vw, 0.75rem);
        margin-bottom: 24px;
      }
    }

    .haiku-stage .lines {
      line-height: 1.8;
      transition: color 2s ease, text-shadow 2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (min-width: 640px) {
      .haiku-stage .lines {
        line-height: 2;
      }
    }

    .haiku-stage .line {
      display: block;
      font-size: clamp(1.1rem, 5vw, 2.8rem);
      opacity: 0;
      transform: translateY(12px);
    }

    @media (min-width: 640px) {
      .haiku-stage .line {
        white-space: nowrap;
        font-size: clamp(1.6rem, 4.5vw, 2.8rem);
      }
    }

    .haiku-stage .line.l1 { animation: fadeUp 0.7s 0.5s ease forwards; }
    .haiku-stage .line.l2 { animation: fadeUp 0.7s 1.2s ease forwards; }
    .haiku-stage .line.l3 { animation: fadeUp 0.7s 1.9s ease forwards; }

    .haiku-stage .sep {
      display: block;
      font-size: 0.4em;
      margin: 2px 0;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    @media (min-width: 640px) {
      .haiku-stage .sep {
        margin: 4px 0;
      }
    }
    .haiku-stage .sep:nth-of-type(1) { animation-delay: 0.9s; }
    .haiku-stage .sep:nth-of-type(2) { animation-delay: 1.6s; }

    .haiku-stage .definition {
      font-size: 0.6rem;
      line-height: 1.5;
      margin-top: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 2.8s;
      transition: color 2s ease;
    }

    @media (min-width: 640px) {
      .haiku-stage .definition {
        font-size: 0.7rem;
        line-height: 1.6;
        margin-top: 32px;
      }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Bottom ── */
    .bottom-bar {
      flex-shrink: 0;
      padding: 0 0 4px;
    }

    .swatches {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (min-width: 640px) {
      .swatches {
        gap: 6px;
        flex-wrap: nowrap;
      }
    }

    .swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    @media (min-width: 640px) {
      .swatch {
        gap: 4px;
      }
    }

    .swatch-color {
      width: 32px;
      height: 6px;
      border-radius: 3px;
      opacity: 0;
      animation: scaleIn 0.5s ease forwards;
    }

    @media (min-width: 640px) {
      .swatch-color {
        width: 48px;
        height: 8px;
        border-radius: 4px;
      }
    }

    .swatch:nth-child(1) .swatch-color { animation-delay: 3.0s; }
    .swatch:nth-child(2) .swatch-color { animation-delay: 3.15s; }
    .swatch:nth-child(3) .swatch-color { animation-delay: 3.3s; }
    .swatch:nth-child(4) .swatch-color { animation-delay: 3.45s; }
    .swatch:nth-child(5) .swatch-color { animation-delay: 3.6s; }

    .swatch-hex {
      font-size: 0.45rem;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      transition: color 2s ease;
    }

    @media (min-width: 640px) {
      .swatch-hex {
        font-size: 0.5rem;
        letter-spacing: 0.06em;
      }
    }

    .swatch:nth-child(1) .swatch-hex { animation-delay: 3.1s; }
    .swatch:nth-child(2) .swatch-hex { animation-delay: 3.25s; }
    .swatch:nth-child(3) .swatch-hex { animation-delay: 3.4s; }
    .swatch:nth-child(4) .swatch-hex { animation-delay: 3.55s; }
    .swatch:nth-child(5) .swatch-hex { animation-delay: 3.7s; }

    @keyframes scaleIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }

    /* ── Meta link ── */
    .meta-link {
      position: fixed;
      bottom: 12px;
      right: 12px;
      z-index: 2;
      font-size: 0.55rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 4s;
    }

    @media (min-width: 640px) {
      .meta-link {
        bottom: 20px;
        right: 24px;
        font-size: 0.6rem;
      }
    }

    .meta-link:hover {
      border-color: currentColor;
    }
  </style>
</head>
<body>

<div id="app" class="loading">loading</div>
<script type="module" src="public/app.js"></script>
</body>
</html>
